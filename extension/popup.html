<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #181825;
      --surface-2: #11111b;
      --border: #313244;
      --text: #cdd6f4;
      --subtext: #a6adc8;
      --muted: #6c7086;
      --primary: #89b4fa;
      --success: #a6e3a1;
      --fail: #f38ba8;
      --warn: #f9e2af;
    }
    * { box-sizing: border-box; }
    body {
      width: 300px;
      margin: 0;
      padding: 14px 14px 12px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin: 0;
      color: var(--primary);
      letter-spacing: 0.4px;
    }
    #gear {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s ease, background 0.15s ease;
    }
    #gear:hover { color: var(--primary); background: var(--surface); }

    #status {
      font-size: 12px;
      color: var(--subtext);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 32px;
    }
    #status.success { color: var(--success); border-color: var(--success); }
    #status.error   { color: var(--fail);    border-color: var(--fail);    }
    #status.warn    { color: var(--warn);    border-color: var(--warn);    }

    button#ingest-btn {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: var(--surface-2);
      border: none;
      border-radius: 6px;
      transition: background 0.18s ease, color 0.18s ease, filter 0.15s ease, opacity 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button#ingest-btn:hover:not(:disabled) { filter: brightness(1.08); }
    button#ingest-btn:disabled { cursor: not-allowed; opacity: 0.85; }
    button#ingest-btn.success { background: var(--success); color: var(--surface-2); }
    button#ingest-btn.error   { background: var(--fail);    color: var(--surface-2); }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Rune · Ingest</h1>
    <button id="gear" title="Options">⚙</button>
  </header>
  <div id="status">Ready</div>
  <button id="ingest-btn">Ingest Problem</button>
  <script src="popup.js"></script>
</body>
</html>

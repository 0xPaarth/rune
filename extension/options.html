<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Rune — Options</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #181825;
      --surface-2: #11111b;
      --border: #313244;
      --text: #cdd6f4;
      --subtext: #a6adc8;
      --muted: #6c7086;
      --primary: #89b4fa;
      --success: #a6e3a1;
      --fail: #f38ba8;
      --accent: #cba6f7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .container {
      max-width: 540px;
      margin: 0 auto;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 4px;
      color: var(--primary);
      letter-spacing: 0.5px;
    }
    .subtitle {
      color: var(--muted);
      margin-bottom: 28px;
      font-size: 13px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--subtext);
      font-size: 13px;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }
    .hint code {
      background: var(--surface-2);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--accent);
      font-size: 11.5px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    input:focus {
      border-color: var(--primary);
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }
    button {
      padding: 9px 18px;
      background: var(--primary);
      color: var(--surface-2);
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.05s ease;
    }
    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(1px); }
    button.secondary {
      background: transparent;
      color: var(--subtext);
      border: 1px solid var(--border);
    }
    #status {
      margin-left: auto;
      font-size: 12.5px;
      color: var(--muted);
      transition: color 0.2s ease;
    }
    #status.success { color: var(--success); }
    #status.error { color: var(--fail); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Rune — Options</h1>
    <div class="subtitle">Configure your local daemon connection.</div>

    <div class="card">
      <label for="token">Daemon Auth Token</label>
      <div class="hint">
        Stored in <code>chrome.storage.local</code>. The daemon writes this to
        <code>~/.rune/daemon.token</code> on startup.
      </div>
      <input id="token" type="password" autocomplete="off" spellcheck="false"
             placeholder="paste the 32-byte hex token here" />
      <div class="row">
        <button id="save">Save</button>
        <button id="toggle" class="secondary" type="button">Show</button>
        <div id="status">—</div>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
